# Source feeds for the semiconductor capital equipment news digest.
# Add new sources here without touching code. Each source needs:
#   name      - human-readable label (shown in logs and the digest footer)
#   url       - RSS/Atom feed URL
#   category  - one of: company | tech | policy | business | opinion
#   priority  - 1 (high) to 3 (low); tiebreaker when ranking
#
# Note on company press feeds: several key equipment makers (KLA, Onto, ASML)
# don't publish stable RSS for their newsroom anymore. We get them
# indirectly via trade press and HN keyword filters — V1.5 will add HTML
# scrapers for the IR/press pages where it matters.

# ---------------------------------------------------------------------------
# Trade press — the workhorses; rich in tech detail
# ---------------------------------------------------------------------------

[[sources]]
name = "SemiWiki"
url = "https://semiwiki.com/feed/"
category = "tech"
priority = 1

[[sources]]
name = "Semiconductor Engineering"
url = "https://semiengineering.com/feed/"
category = "tech"
priority = 1

[[sources]]
name = "EE Times"
url = "https://www.eetimes.com/feed/"
category = "tech"
priority = 2

[[sources]]
name = "Bits & Chips"
url = "https://bits-chips.com/feed/"
category = "tech"
priority = 1

[[sources]]
name = "Tom's Hardware"
url = "https://www.tomshardware.com/feeds/all"
category = "tech"
priority = 3

[[sources]]
name = "Semiconductor Digest"
url = "https://www.semiconductor-digest.com/feed/"
category = "tech"
priority = 2

[[sources]]
name = "EE Journal (Semiconductor)"
url = "https://www.eejournal.com/category/semiconductor/feed/"
category = "tech"
priority = 2

[[sources]]
name = "AnySilicon"
url = "https://anysilicon.com/feed/"
category = "tech"
priority = 3

# Tech Xplore is a research-news aggregator — broad and noisy; the relevance
# ranker does the culling. Low priority so it loses ties to focused sources.
[[sources]]
name = "Tech Xplore (Semiconductors)"
url = "https://techxplore.com/rss-feed/semiconductors-news/"
category = "tech"
priority = 3

# ---------------------------------------------------------------------------
# Industry wire / Asia supply chain — fab capacity, tool orders, foundry moves
# DIGITIMES is largely paywalled, but its RSS headlines are high-signal on
# their own (the ranker scores on the headline when the body is gated).
# ---------------------------------------------------------------------------

[[sources]]
name = "DIGITIMES"
url = "https://www.digitimes.com/rss/daily.xml"
category = "business"
priority = 1

[[sources]]
name = "Evertiq"
url = "https://feeds2.feedburner.com/EvertiqCom/All"
category = "business"
priority = 3

# ---------------------------------------------------------------------------
# HN keyword filters — surprisingly high-signal for semi equipment news
# hnrss.org is a free service that turns HN searches into RSS feeds.
# The relevance ranker will filter out the noise.
# ---------------------------------------------------------------------------

[[sources]]
name = "Hacker News (ASML query)"
url = "https://hnrss.org/newest?q=ASML&points=5"
category = "company"
priority = 1

[[sources]]
name = "Hacker News (KLA/lithography/EUV)"
url = "https://hnrss.org/newest?q=KLA+OR+lithography+OR+EUV&points=5"
category = "tech"
priority = 1

[[sources]]
name = "Hacker News (TSMC/Samsung/Intel fab)"
url = "https://hnrss.org/newest?q=%28TSMC+OR+%22Samsung+foundry%22+OR+%22Intel+foundry%22%29+fab&points=10"
category = "business"
priority = 2

[[sources]]
name = "Hacker News (chip export controls)"
url = "https://hnrss.org/newest?q=%22export+controls%22+%28chip+OR+semiconductor%29&points=5"
category = "policy"
priority = 1

[[sources]]
name = "Hacker News (CHIPS Act / Taiwan)"
url = "https://hnrss.org/newest?q=%28%22CHIPS+Act%22+OR+%22Taiwan+chip%22+OR+%22semiconductor+policy%22%29&points=5"
category = "policy"
priority = 2

# ---------------------------------------------------------------------------
# Opinion & analysis — independent commentary, not straight reporting.
# Both Substacks publish FULL article text in RSS for free posts; paid /
# subscriber-only posts arrive as a "Read more" stub (title-only to the
# ranker). The ranker handles both — stubs just score on the headline.
# ---------------------------------------------------------------------------

[[sources]]
name = "SemiAnalysis"
url = "https://www.semianalysis.com/feed"
category = "opinion"
priority = 1

[[sources]]
name = "Fabricated Knowledge"
url = "https://www.fabricatedknowledge.com/feed"
category = "opinion"
priority = 1

[[sources]]
name = "The Chip Letter"
url = "https://thechipletter.substack.com/feed"
category = "opinion"
priority = 3

[[sources]]
name = "IEEE Spectrum (Semiconductors)"
url = "https://spectrum.ieee.org/feeds/topic/semiconductors.rss"
category = "opinion"
priority = 2
