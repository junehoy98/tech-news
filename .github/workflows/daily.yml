name: Daily Digest

on:
  workflow_dispatch:  # manual trigger still available
  schedule:
    # GitHub's scheduler runs cron in UTC, ignores DST, and can lag by hours
    # under load. So these crons only START a runner early — the job itself
    # waits until --send-at (9 AM America/New_York, DST-aware) before sending.
    # Three staggered starts are backups: if GitHub drops or badly delays the
    # earliest run, a later one still lands before the send time. `concurrency`
    # + the "already sent today" marker ensure exactly one email goes out.
    # Day-of-week 1-5 = Mon-Fri (Sun=0, Sat=6).
    - cron: "27 8 * * 1-5"   # primary: ~4.5 h slack before the 9 AM ET send
    - cron: "27 9 * * 1-5"   # backup
    - cron: "27 10 * * 1-5"  # backup

# Never cancel the in-progress (sleeping) run; later triggers queue behind it
# and then no-op via the already-sent marker.
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # under the 360-min hard cap; covers the longest (winter) wait
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Restore dedupe DB from cache
        # Keeps the seen-article state across daily runs so we don't repeat
        # items. The date in the key forces a new cache entry per day, and
        # restore-keys falls back to whatever was most recently saved.
        uses: actions/cache@v4
        with:
          path: data/seen.sqlite
          key: dedupe-db-${{ github.run_id }}
          restore-keys: |
            dedupe-db-

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_FROM_ADDRESS: ${{ secrets.GMAIL_FROM_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO_ADDRESS: ${{ secrets.DIGEST_TO_ADDRESS }}
        run: python -m tech_news.main --send-at 08:58:37 --send-tz America/New_York
